version: '3.8'

services:
  vodazlin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vodazlin
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - vodazlin_data:/app/data

volumes:
  vodazlin_data:
